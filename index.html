    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        :root {
            /* Modernized Professional Colors (School Green & Yellow tones) */
            --primary-green: #1A4334; /* Rich Dark Green */
            --green-gradient: linear-gradient(135deg, #2D6A4F 0%, #1A4334 100%);
            --secondary-yellow: #FFC300; /* Rich Gold Accent */
            --bg-color: #F8F9FA; /* Ultra light grey */
            --card-bg: #FFFFFF;
            --text-dark: #333333;
            --text-light: #666666;
            --accent-green: #2D6A4F; /* Lighter Green for accents */
            --accent-yellow: #FFC300;
        }

        body {
            font-family: 'Noto Sans Sinhala', 'Poppins', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding-top: 60px; /* Space for fixed header */
            color: var(--text-dark);
        }

        /* --- Keyframes for Animations --- */
        @keyframes fadeInSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* --- Top Header (Fixed) --- */
        .app-header {
            background-color: var(--primary-green);
            background: var(--green-gradient);
            color: var(--secondary-yellow);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 1000;
            opacity: 0;
            animation: fadeInSlideUp 0.5s ease-out forwards;
        }

        .app-header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .app-header span {
            color: white;
            font-size: 14px;
            margin-left: 8px;
            font-weight: 400;
            opacity: 0.9;
        }

        /* --- Main Content Section --- */
        #plant-content {
            display: none; /* Hidden until loaded */
        }

        .plant-data-section {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* --- Hero Image Section --- */
        .hero-section {
            width: 100%;
            height: 300px;
            position: relative;
            background-color: var(--primary-green);
            overflow: hidden;
        }

        .plant-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transform: scale(1.1);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .plant-image.loaded {
            opacity: 0.9;
            transform: scale(1);
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.7) 100%);
        }

        /* --- Content Wrapper & Cards --- */
        .content-wrapper {
            flex: 1;
            max-width: 600px;
            margin: -50px auto 0; /* Important for overlap design */
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        /* Common card styling */
        .modern-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            opacity: 0;
            animation: fadeInSlideUp 0.6s ease-out forwards;
            overflow: hidden;
            margin-bottom: 25px;
        }

        /* Animation delays */
        .title-card { animation-delay: 0.2s; }
        .details-card { animation-delay: 0.4s; }

        /* --- Title Card Details --- */
        .title-card {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent-yellow);
        }

        .plant-title {
            color: var(--primary-green);
            font-size: 34px;
            font-weight: 700;
            margin: 0 0 5px 0;
            letter-spacing: -0.5px;
        }

        .scientific-name {
            color: var(--text-light);
            font-size: 16px;
            font-style: italic;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            opacity: 0.8;
        }

        /* --- Details Card (structured content) --- */
        .details-card {
            padding: 30px 25px;
        }

        .section-title {
            color: var(--primary-green);
            font-size: 19px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            padding-bottom: 8px;
        }
        
        /* Stylized underline */
        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 3px;
            background-color: var(--accent-yellow);
            border-radius: 3px;
        }

        .section-content {
            color: var(--text-dark);
            line-height: 1.9;
            font-size: 15.5px;
            text-align: justify;
            margin: 0 0 25px 0;
        }

        /* Benefits list styling */
        .benefits-list {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .benefits-list li {
            position: relative;
            padding-left: 25px;
            margin-bottom: 12px;
        }

        /* Modernized bullet point icon */
        .benefits-list li::before {
            content: '🌿';
            position: absolute;
            left: 0;
            top: 2px;
            color: var(--accent-green);
            font-size: 16px;
        }

        /* --- Footer --- */
        .app-footer {
            background-color: var(--primary-green);
            background: var(--green-gradient);
            padding: 25px 20px;
            text-align: center;
            margin-top: auto;
            border-top: 3px solid var(--accent-yellow);
            opacity: 0;
            animation: fadeInSlideUp 0.5s ease-out forwards;
            animation-delay: 0.6s;
        }

        .school-name {
            color: white;
            font-weight: 600;
            font-size: 14.5px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .developer-credit {
            color: #CFCFCF;
            font-size: 12.5px;
            font-family: 'Poppins', sans-serif;
            opacity: 0.9;
        }

        .highlight {
            color: var(--accent-yellow);
        }

        /* --- Error Message & Loading --- */
        #error-msg {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 50px 20px;
            text-align: center;
            margin-top: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            opacity: 0;
            animation: fadeInScaleIn 0.5s ease-out forwards;
        }

        #error-msg h2 {
            color: #E74C3C;
            font-size: 26px;
            margin-top: 0;
        }
        
        #error-msg p {
            font-size: 15px;
            color: var(--text-dark);
        }

    </style>
</head>

        const urlParams = new URLSearchParams(window.location.search);
        const plantId = urlParams.get('plant');

        const contentDiv = document.getElementById('plant-content');
        const errorMsg = document.getElementById('error-msg');
        const plantImage = document.getElementById('p-image');

        if (plantId && plantData[plantId]) {
            const data = plantData[plantId];
            
            // Set basic info
            document.getElementById('p-title').innerText = data.title;
            document.getElementById('p-scientific').innerText = data.scientific;
            document.getElementById('p-description').innerText = data.description;
            
            // Handle image loading animation
            plantImage.src = data.image;
            plantImage.onload = function() {
                this.classList.add('loaded'); // Add 'loaded' class when image is loaded
            };

            // Set structured benefits list
            const benefitsList = document.getElementById('p-benefits');
            benefitsList.innerHTML = ''; // Clear existing
            data.benefits.forEach(benefit => {
                const li = document.createElement('li');
                li.innerText = benefit;
                benefitsList.appendChild(li);
            });

            contentDiv.style.display = 'block'; // Show content
        } else {
            errorMsg.style.display = 'block'; // Show error
        }
